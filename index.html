<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們要結婚了！婚禮線上喜帖</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcf8f7;
            color: #4a4a4a;
        }
        .hero-section {
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('https://picsum.photos/1920/1080?wedding') no-repeat center center;
            background-size: cover;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wedding-title {
            font-size: 3rem;
            letter-spacing: 5px;
            color: #c99a91;
        }
        .info-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }
        .btn-custom {
            background-color: #c99a91;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background-color: #b38279;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 主視覺區 (Hero) -->
    <header class="hero-section text-center">
        <div class="container py-5">
            <h1 class="wedding-title fw-bold mb-3">陳大明 & 林小美</h1>
            <p class="fs-4 text-muted mb-2">誠摯邀請您參與我們的婚禮</p>
            <div class="h5 text-secondary">2026 . 12 . 25</div>
        </div>
    </header>

    <!-- 訊息與宴客資訊區 -->
    <main class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <div class="info-card">
                    <h3 class="mb-4 text-dark">- Wedding Invitation -</h3>
                    <p class="lead mb-4">
                        因為有您一路的陪伴與祝福，<br>
                        讓我們的故事更加圓滿。<br>
                        在這個特別的日子裡，期待與您一同分享這份喜悅！
                    </p>
                    
                    <hr class="my-4" style="border-color: #e5e5e5;">
                    
                    <!-- 時間地點 -->
                    <div class="row text-start justify-content-center">
                        <div class="col-11 mb-3">
                            <strong>【 日期時間 】</strong><br>
                            2026 年 12 月 25 日 (星期五) 11:30 入席 / 12:00 開席
                        </div>
                        <div class="col-11 mb-4">
                            <strong>【 婚宴地點 】</strong><br>
                            幸福大飯店 3 樓 璀璨廳<br>
                            <span class="text-muted small">地址：桃園市OO區OO路 123 號 (內附免費停車場)</span>
                        </div>
                    </div>

                    <!-- 出席意願調查按鈕 -->
                    <div class="mt-4">
                        <p class="text-muted small">為了方便統計人數，請於 11/30 前填寫出席表單</p>
                        <!-- 這裡可以置換成你的 Google 表單連結 -->
                        <a href="https://forms.google.com" target="_blank" class="btn btn-custom btn-lg shadow-sm">填寫出席意願調查</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="text-center py-4 bg-light text-muted small">
        &copy; 2026 大明 & 小美. Made with love.
    </footer>

    <!-- 引入 Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
